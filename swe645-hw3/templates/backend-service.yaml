# Peter Shin (G01073633)
# Helm template for the NodePort Service exposing the FastAPI survey backend
# (port 30611) so the browser-side React app and Postman can reach the API.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "swe645-hw3.fullname" . }}-backend
  labels:
    {{- include "swe645-hw3.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.backend.service.type "NodePort") .Values.backend.service.nodePort }}
      nodePort: {{ .Values.backend.service.nodePort }}
      {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "swe645-hw3.name" . }}-backend
    app.kubernetes.io/instance: {{ .Release.Name }}
