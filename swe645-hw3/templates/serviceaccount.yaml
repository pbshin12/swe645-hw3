{{- /*
Peter Shin (G01073633)
Helm template for the ServiceAccount the survey app pods run as.
*/ -}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "swe645-hw3.serviceAccountName" . }}
  labels:
    {{- include "swe645-hw3.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
